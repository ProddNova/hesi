services:
  - type: web
    name: shutoko-nights
    runtime: static
    buildCommand: echo "Static game - no build step"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      # Editor textures are content-hashed (name changes when pixels change),
      # so browsers can cache them forever without ever seeing stale images.
      - path: /data/editor/textures/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
