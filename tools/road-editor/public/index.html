<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shutoko · Editor stradale</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="app.css">
</head>
<body>
<header id="topbar">
  <div class="brand">首都高 <span>EDITOR STRADALE</span></div>

  <div class="tgroup" id="viewTools">
    <button id="btnFitAll" title="Adatta l'intera rete [A]">⤢ Rete</button>
    <button id="btnFitRoute" title="Adatta il percorso selezionato [F]">⤢ Percorso</button>
    <button id="btnFitSection" title="Adatta la sezione A–B [G]">⤢ Sezione</button>
    <button id="btnResetView" title="Vista iniziale [0]">⟲</button>
  </div>

  <div class="tgroup layers" id="layerChips" title="Livelli visibili"></div>

  <div class="spacer"></div>

  <div class="tgroup" id="editTools">
    <button id="btnUndo" title="Annulla [Ctrl+Z]" disabled>↩</button>
    <button id="btnRedo" title="Ripeti [Ctrl+Y]" disabled>↪</button>
    <button id="btnSnap" class="toggle" title="Aggancio alla linea OSM / griglia [S]">🧲 Snap</button>
  </div>

  <div class="tgroup">
    <button id="btnValidate" title="Controlli rapidi su tutte le modifiche">✓ Validazione</button>
    <button id="btnRegen" title="Rigenera l'intera rete su file TEMPORANEI (i dati di produzione non vengono toccati)">⚙ Rigenera anteprima</button>
    <button id="btnValidateFull" title="Esegue le sonde complete del progetto (lente, sola lettura)">✓✓ Completa</button>
    <button id="btnApply" title="Applica alla working tree (disabilitato: riavvia il server con --allow-apply)" disabled>Applica</button>
  </div>

  <div class="tgroup">
    <button id="btnSave" class="primary" title="Salva override [Ctrl+S]">💾 Salva override<span id="dirtyDot" hidden>●</span></button>
    <button id="btnMenu" title="Altre azioni">▾</button>
  </div>

  <button id="btnHelp" title="Aiuto e scorciatoie [?]">?</button>
</header>

<div id="main">
  <aside id="sidebar">
    <input id="search" type="search" placeholder="Cerca percorso, nome o ID…" autocomplete="off">
    <div id="filters">
      <button data-f="all" class="on">Tutti</button>
      <button data-f="mainline">Principali</button>
      <button data-f="ramp">Rampe</button>
      <button data-f="edited">Modificati</button>
      <button data-f="warn">Con avvisi</button>
    </div>
    <div id="routeList" role="listbox"></div>
  </aside>

  <div id="mapwrap">
    <canvas id="map"></canvas>
    <canvas id="minimap" title="Panoramica — clic per spostarti"></canvas>
    <div id="calcBadge" hidden><span class="spin"></span> Anteprima: calcolo…</div>
    <div id="toast" hidden></div>
    <div id="mapMenu" hidden></div>
  </div>

  <aside id="inspector">
    <div id="routeInfo"><div class="placeholder">Seleziona un percorso<br>cliccandolo sulla mappa<br>o dall'elenco a sinistra.</div></div>
    <div id="sectionTools" hidden>
      <h3>Sezione <span class="hint">imposta A e B sul percorso</span></h3>
      <div class="row">
        <button id="btnSecA" title="Poi clicca sul percorso per fissare A">Imposta A</button>
        <button id="btnSecB" title="Poi clicca sul percorso per fissare B">Imposta B</button>
        <button id="btnSecClear" title="Rimuovi i marcatori A e B">✕</button>
      </div>
      <div class="row">
        <button id="btnSecSmooth" title="Ammorbidisce la sezione (vincolo di levigatura locale)">Liscia</button>
        <button id="btnSecStraighten" title="Tira la sezione verso la corda A–B">Raddrizza</button>
        <button id="btnSecArc" title="Adatta un arco circolare ampio fra A e B">Arco</button>
      </div>
      <div class="row">
        <button id="btnSecCalm" title="Riduce le oscillazioni sinistra/destra nella sezione">Riduci oscillazioni</button>
        <button id="btnSecReset" title="Elimina le modifiche manuali dentro A–B">Reset sezione</button>
      </div>
    </div>
    <div id="handlePanel" hidden>
      <h3>Maniglia <span id="handleTitle"></span></h3>
      <div class="grid2">
        <label>X <input id="hx" type="number" step="0.1"></label>
        <label>Z <input id="hz" type="number" step="0.1"></label>
        <label>Influenza <input id="hinf" type="number" step="5" min="0" max="2000"> m</label>
        <label>Peso <input id="hw" type="number" step="1" min="1" max="100000"></label>
      </div>
      <label class="row">Nota <input id="hnote" type="text" maxlength="500" placeholder="perché questa modifica?"></label>
      <div class="row">
        <label><input id="hen" type="checkbox"> attiva</label>
        <button id="btnHRestore" title="Riporta la maniglia alla posizione originale">⟲ Ripristina</button>
        <button id="btnHDelete" title="Elimina la maniglia [Canc]">🗑 Elimina</button>
      </div>
      <div class="hint" id="handleMeta"></div>
    </div>
    <div id="warnPanel">
      <h3>Avvisi <span id="warnNav"><button id="btnWarnPrev" title="Avviso precedente [N]">‹</button><button id="btnWarnNext" title="Avviso successivo [n]">›</button></span></h3>
      <div id="findings"><div class="placeholder">Nessun avviso.</div></div>
    </div>
    <div id="statsPanel" hidden>
      <h3>Curvatura e qualità</h3>
      <canvas id="curvGraph" width="300" height="90"></canvas>
      <div id="statsText"></div>
    </div>
  </aside>
</div>

<footer id="statusbar">
  <span id="sbCoords">x — · z —</span>
  <span id="sbStation"></span>
  <span id="sbZoom"></span>
  <span id="sbSel"></span>
  <span class="spacer"></span>
  <span id="sbDraft"></span>
  <span id="sbState">pronto</span>
</footer>

<div id="modal" hidden>
  <div id="modalCard">
    <div id="modalHead"><span id="modalTitle"></span><button id="modalClose">✕</button></div>
    <div id="modalBody"></div>
    <div id="modalFoot"></div>
  </div>
</div>

<input id="importFile" type="file" accept="application/json,.json" hidden>

<script type="module" src="js/app.mjs"></script>
<script type="module" src="js/edit.mjs"></script>
<script type="module" src="js/save.mjs"></script>
<script type="module" src="js/actions.mjs"></script>
</body>
</html>
